<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Sequencer</title>
    <link rel="stylesheet" href="/src/main.css" />
  </head>
  <body>
    <h1>Grid Sequencer</h1>
    <p class="note">
      Click a cell to toggle it on/off. Right-click any cell, row label, or
      column header to edit it in the panel on the right. Left-click a row
      label to mute it; left-click a column header to skip that step for
      every row.
    </p>
    <div id="unlock"></div>
    <div id="app" class="hidden">
      <div class="transport">
        <button id="play-button">Play</button>
        <button id="stop-button">Stop</button>
        <button id="master-button">Master…</button>
        <label>
          Tempo
          <input id="bpm" type="number" min="20" max="300" step="1" value="120" />
          BPM
        </label>
        <label>
          Subdivision
          <select id="subdivision"></select>
        </label>
        <label>
          Steps
          <input id="column-count" type="number" min="1" max="32" step="1" value="8" />
        </label>
        <label>
          Row/column precedence
          <select id="precedence-select">
            <option value="row">Row wins</option>
            <option value="column">Column wins</option>
          </select>
        </label>
      </div>
      <div id="grid"></div>
      <div class="add-row">
        <select id="new-row-type"></select>
        <input id="new-row-name" type="text" placeholder="Row name" />
        <button id="add-row-button">Add row</button>
      </div>
      <div class="patch-controls">
        <input id="patch-name" type="text" placeholder="Patch name" />
        <button id="save-patch-button">Save</button>
        <select id="patch-select"></select>
        <button id="load-patch-button">Load</button>
        <span id="patch-status"></span>
      </div>
    </div>
  </body>
  <script type="module" src="/src/main.ts"></script>
</html>
