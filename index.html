<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Sequencer</title>
    <link rel="stylesheet" href="/src/main.css" />
  </head>
  <body>
    <h1>Grid Sequencer</h1>
    <p class="note">
      Click a cell to toggle it on/off. Right-click any cell, row label, or
      column header for its config menu. Row labels mute; column headers
      skip that step for every row.
    </p>
    <div id="unlock"></div>
    <div id="app" class="hidden">
      <div class="transport">
        <button id="play-button">Play</button>
        <button id="stop-button">Stop</button>
        <label>
          Step length (s)
          <input id="step-seconds" type="range" min="0.08" max="0.6" step="0.01" value="0.18" />
          <span id="step-seconds-value"></span>
        </label>
        <label>
          Row/column precedence
          <select id="precedence-select">
            <option value="row">Row wins</option>
            <option value="column">Column wins</option>
          </select>
        </label>
      </div>
      <div id="grid"></div>
      <div class="add-row">
        <select id="new-row-type"></select>
        <input id="new-row-name" type="text" placeholder="Row name" />
        <button id="add-row-button">Add row</button>
      </div>
    </div>
  </body>
  <script type="module" src="/src/main.ts"></script>
</html>
